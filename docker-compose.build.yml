services:

  # ----------------------------------------------------------
  # Frontend — React application served via nginx
  # Entry point for all user traffic. Proxies /api/, /auth/,
  # and /health to the backend over the public network.
  # Exposed: yes (port 3000 — local build access)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
        VITE_APP_ENV: ${APP_ENV:-dev}
    image: weaving_site_frontend:${APP_VERSION:-dev}
    container_name: weaving_site_frontend
    ports:
      - "127.0.0.1:3000:80"
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # Reachable only through the nginx proxy; not exposed to host.
  # Connected to both networks so nginx can reach it (public)
  # and it can reach db and redis (internal).
  # Exposed: no
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: weaving_site_backend:${APP_VERSION:-dev}
    container_name: weaving_site_backend
    networks:
      - public
      - internal
    env_file:
      - .env.local
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery worker — background task processor
  # Uses the same backend image; runs the Celery worker instead of uvicorn.
  # ----------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: weaving_site_backend:${APP_VERSION:-dev}
    container_name: weaving_site_worker
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    networks:
      - internal
    env_file:
      - .env.local
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis — Celery broker and result backend
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: weaving_site_redis
    networks:
      - internal
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # Database — PostgreSQL (local dev only)
  # Only starts when the "local-db" profile is active.
  # Set COMPOSE_PROFILES=local-db in .env.local to enable.
  # When POSTGRES_DSN is set (e.g. Neon), leave COMPOSE_PROFILES
  # unset — this container will not start.
  # ----------------------------------------------------------
  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: weaving_site_db
    networks:
      - internal
    ports:
      - "127.0.0.1:5435:5432"
    env_file:
      - .env.local
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge


volumes:
  postgres_data:
  uploads:
