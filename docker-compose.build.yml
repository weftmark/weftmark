x-worker-env: &worker-env
  APP_ENV: ${APP_ENV}
  APP_SECRET_KEY: ${APP_SECRET_KEY}
  DEBUG: ${DEBUG}
  LOG_LEVEL: ${LOG_LEVEL}
  POSTGRES_DSN: ${POSTGRES_DSN:-}
  POSTGRES_DSN_DIRECT: ${POSTGRES_DSN_DIRECT:-}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
  STORAGE_BACKEND: ${STORAGE_BACKEND}
  UPLOAD_DIR: ${UPLOAD_DIR}
  MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
  S3_REGION: ${S3_REGION}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME}
  INVITE_EXPIRY_DAYS_DEFAULT: ${INVITE_EXPIRY_DAYS_DEFAULT}
  REDIS_URL: ${REDIS_URL}
  RENDER_MAX_WIDTH: ${RENDER_MAX_WIDTH}
  RENDER_MAX_HEIGHT: ${RENDER_MAX_HEIGHT}
  RENDER_DEFAULT_ZOOM: ${RENDER_DEFAULT_ZOOM}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
  GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/data/GeoLite2-City.mmdb}

x-worker: &worker-base
  build:
    context: .
    dockerfile: backend/Dockerfile
  image: weaving_site_backend:${APP_VERSION:-dev}
  environment:
    <<: *worker-env
    OTEL_SERVICE_NAME: weftmark-worker
  networks:
    - internal
  volumes:
    - uploads:/app/uploads
  depends_on:
    redis:
      condition: service_healthy
    db:
      condition: service_healthy
      required: false
  restart: unless-stopped

services:

  # ----------------------------------------------------------
  # Frontend — React application served via nginx
  # Entry point for all user traffic. Proxies /api/, /auth/,
  # and /health to the backend over the public network.
  # Exposed: yes (port 3000 — local build access)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_ENV: ${APP_ENV:-dev}
        VITE_DEV_BANNER_COLOR: ${VITE_DEV_BANNER_COLOR:-}
        VITE_CLERK_SIGN_IN_URL: /login
        VITE_CLERK_SIGN_UP_URL: /register
        VITE_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /home
        VITE_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /home
    image: weaving_site_frontend:${APP_VERSION:-dev}
    environment:
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    container_name: weaving_site_frontend
    ports:
      - "3000:80"
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # Reachable only through the nginx proxy; not exposed to host.
  # Connected to both networks so nginx can reach it (public)
  # and it can reach db and redis (internal).
  # Exposed: no
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: weaving_site_backend:${APP_VERSION:-dev}
    container_name: weaving_site_backend
    networks:
      - public
      - internal
    environment:
      APP_ENV: ${APP_ENV}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      SEED_ENABLED: ${SEED_ENABLED}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      POSTGRES_DSN: ${POSTGRES_DSN:-}
      POSTGRES_DSN_DIRECT: ${POSTGRES_DSN_DIRECT:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-}
      CF_ZERO_TRUST_ENABLED: ${CF_ZERO_TRUST_ENABLED:-false}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      INVITE_EXPIRY_DAYS_DEFAULT: ${INVITE_EXPIRY_DAYS_DEFAULT}
      REDIS_URL: ${REDIS_URL}
      RENDER_MAX_WIDTH: ${RENDER_MAX_WIDTH}
      RENDER_MAX_HEIGHT: ${RENDER_MAX_HEIGHT}
      RENDER_DEFAULT_ZOOM: ${RENDER_DEFAULT_ZOOM}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-weftmark-api}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      GEOIP_DB_PATH: ${GEOIP_DB_PATH:-/app/data/GeoLite2-City.mmdb}
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery workers — background task processors
  # Use the same backend image; run the Celery worker instead of uvicorn.
  # worker2 is gated behind the worker02 profile.
  # CELERY_CONCURRENCY defaults to 2 if unset.
  # ----------------------------------------------------------
  worker:
    <<: *worker-base
    container_name: weaving_site_worker
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-2}", "--hostname=worker1@%h"]

  worker2:
    <<: *worker-base
    container_name: weaving_site_worker2
    profiles: [worker02]
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-2}", "--hostname=worker2@%h"]

  # ----------------------------------------------------------
  # Celery Beat — cron scheduler
  # Fires run_scheduled_tasks every 60 seconds. Only one Beat
  # instance should run at a time. --pidfile= disables the pid
  # file so container restarts don't leave a stale lock.
  # ----------------------------------------------------------
  beat:
    <<: *worker-base
    container_name: weaving_site_beat
    environment:
      <<: *worker-env
      OTEL_SERVICE_NAME: weftmark-beat
    entrypoint: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info", "--pidfile="]

  # ----------------------------------------------------------
  # Redis — Celery broker and result backend
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: weaving_site_redis
    networks:
      - internal
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # Database — PostgreSQL (local dev only)
  # Only starts when the "local-db" profile is active.
  # Set COMPOSE_PROFILES=local-db in .env.local to enable.
  # When POSTGRES_DSN is set (e.g. Neon), leave COMPOSE_PROFILES
  # unset — this container will not start.
  # ----------------------------------------------------------
  db:
    profiles: ["local-db"]
    image: postgres:17-alpine
    container_name: weaving_site_db
    networks:
      - internal
    ports:
      - "127.0.0.1:5435:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  public:
    driver: bridge
  internal:
    driver: bridge


volumes:
  postgres_data:
  uploads:
