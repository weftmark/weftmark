services:

  # ----------------------------------------------------------
  # Frontend — React application served via nginx
  # Pulls the published image from ghcr.io.
  # Traefik routes https://weftmark.com → this container via traefik_proxy network.
  # ----------------------------------------------------------
  frontend:
    image: ghcr.io/weftmark/weftmark-frontend:latest
    container_name: weftmark_frontend_prod
    networks:
      - traefik_proxy
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.weftmark-prod.rule=Host(`weftmark.com`) || Host(`www.weftmark.com`)"
      - "traefik.http.routers.weftmark-prod.entrypoints=websecure"
      - "traefik.http.routers.weftmark-prod.tls.certresolver=cloudflare"
      - "traefik.http.services.weftmark-prod.loadbalancer.server.port=80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # Pulls the published image from ghcr.io.
  # Reverse proxy: https://weftmark.com/api/ → localhost:8000
  # ----------------------------------------------------------
  backend:
    image: ghcr.io/weftmark/weftmark-backend:latest
    container_name: weftmark_backend_prod
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - public
      - internal
    env_file:
      - .env.prod
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery worker — background task processor
  # ----------------------------------------------------------
  worker:
    image: ghcr.io/weftmark/weftmark-backend:latest
    container_name: weftmark_worker_prod
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    networks:
      - internal
    env_file:
      - .env.prod
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis — Celery broker and result backend
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: weftmark_redis_prod
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # Database — PostgreSQL (optional, local-db profile only)
  # Only starts when COMPOSE_PROFILES=local-db is set in .env.prod.
  # Skip this if using a managed database (e.g. Neon).
  # ----------------------------------------------------------
  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: weftmark_db_prod
    networks:
      - internal
    ports:
      - "127.0.0.1:5433:5432"
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  traefik_proxy:
    external: true
    name: traefik_proxy
  public:
    name: weftmark_prod_public
    driver: bridge
  internal:
    name: weftmark_prod_internal
    driver: bridge

volumes:
  postgres_data:
    name: weftmark_prod_postgres_data
  uploads:
    name: weftmark_prod_uploads
