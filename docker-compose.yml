x-worker-env: &worker-env
  APP_ENV: ${APP_ENV}
  APP_SECRET_KEY: ${APP_SECRET_KEY}
  DEBUG: ${DEBUG}
  LOG_LEVEL: ${LOG_LEVEL}
  POSTGRES_DSN: ${POSTGRES_DSN}
  POSTGRES_DSN_DIRECT: ${POSTGRES_DSN_DIRECT}
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
  STORAGE_BACKEND: ${STORAGE_BACKEND}
  UPLOAD_DIR: ${UPLOAD_DIR}
  MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME}
  S3_REGION: ${S3_REGION}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
  SMTP_FROM_NAME: ${SMTP_FROM_NAME}
  INVITE_EXPIRY_DAYS_DEFAULT: ${INVITE_EXPIRY_DAYS_DEFAULT}
  REDIS_URL: ${REDIS_URL}
  RENDER_MAX_WIDTH: ${RENDER_MAX_WIDTH}
  RENDER_MAX_HEIGHT: ${RENDER_MAX_HEIGHT}
  RENDER_DEFAULT_ZOOM: ${RENDER_DEFAULT_ZOOM}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=${APP_ENV},service.version=${IMAGE_TAG:-dev}"
  OTEL_SERVICE_NAME: weftmark-worker
  GITHUB_FEEDBACK_TOKEN: ${GITHUB_FEEDBACK_TOKEN:-}

x-worker: &worker-base
  image: ghcr.io/weftmark/weftmark-backend:${IMAGE_TAG:-latest}
  environment:
    <<: *worker-env
  networks:
    - internal
  volumes:
    - uploads:/app/uploads
  depends_on:
    redis:
      condition: service_healthy
    db:
      condition: service_healthy
      required: false
  restart: unless-stopped

services:

  # ----------------------------------------------------------
  # Frontend — React application served via nginx
  # Proxies /api/ and /auth/ to the backend over the
  # public network.  Traefik routing is added via override file
  # in the orchestration repo (docker-compose.override.yml).
  # ----------------------------------------------------------
  frontend:
    image: ghcr.io/weftmark/weftmark-frontend:${IMAGE_TAG:-latest}
    container_name: ${STACK_NAME:-weftmark}_frontend
    environment:
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
    networks:
      - public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # Reachable by the frontend via the public network; reaches
  # Redis and (optionally) the local db via the internal network.
  # Not directly exposed — traefik routes through the frontend.
  # ----------------------------------------------------------
  backend:
    image: ghcr.io/weftmark/weftmark-backend:${IMAGE_TAG:-latest}
    container_name: ${STACK_NAME:-weftmark}_backend
    environment:
      APP_ENV: ${APP_ENV}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      DEBUG: ${DEBUG}
      LOG_LEVEL: ${LOG_LEVEL}
      SEED_ENABLED: ${SEED_ENABLED}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      POSTGRES_DSN: ${POSTGRES_DSN}
      POSTGRES_DSN_DIRECT: ${POSTGRES_DSN_DIRECT}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL}
      CF_ZERO_TRUST_ENABLED: ${CF_ZERO_TRUST_ENABLED:-false}
      CF_ACCESS_CLIENT_ID: ${CF_ACCESS_CLIENT_ID:-}
      CF_ACCESS_CLIENT_SECRET: ${CF_ACCESS_CLIENT_SECRET:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      UPLOAD_DIR: ${UPLOAD_DIR}
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      INVITE_EXPIRY_DAYS_DEFAULT: ${INVITE_EXPIRY_DAYS_DEFAULT}
      REDIS_URL: ${REDIS_URL}
      RENDER_MAX_WIDTH: ${RENDER_MAX_WIDTH}
      RENDER_MAX_HEIGHT: ${RENDER_MAX_HEIGHT}
      RENDER_DEFAULT_ZOOM: ${RENDER_DEFAULT_ZOOM}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=${APP_ENV},service.version=${IMAGE_TAG:-dev}"
      OTEL_SERVICE_NAME: weftmark-api
      GITHUB_FEEDBACK_TOKEN: ${GITHUB_FEEDBACK_TOKEN:-}
    networks:
      - public
      - internal
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery workers — background task processors
  # Use the same backend image; run the Celery worker instead
  # of uvicorn.  Share the uploads volume with the backend.
  # worker2 is identical but gated behind the worker02 profile.
  # CELERY_CONCURRENCY defaults to 2 if unset.
  # ----------------------------------------------------------
  worker:
    <<: *worker-base
    container_name: ${STACK_NAME:-weftmark}_worker
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-2}", "--hostname=worker1@%h"]

  worker2:
    <<: *worker-base
    container_name: ${STACK_NAME:-weftmark}_worker2
    profiles: [worker02]
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-2}", "--hostname=worker2@%h"]

  # ----------------------------------------------------------
  # Celery Beat — cron scheduler
  # Fires run_scheduled_tasks every 60 seconds. Only one Beat
  # instance should run at a time. --pidfile= disables the pid
  # file so container restarts don't leave a stale lock.
  # ----------------------------------------------------------
  beat:
    <<: *worker-base
    container_name: ${STACK_NAME:-weftmark}_beat
    entrypoint: ["celery", "-A", "app.celery_app", "beat", "--loglevel=info", "--pidfile="]
    environment:
      <<: *worker-env
      OTEL_SERVICE_NAME: weftmark-beat

  # ----------------------------------------------------------
  # Redis — Celery broker and result backend
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${STACK_NAME:-weftmark}_redis
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # Database — PostgreSQL (optional, local-db profile only)
  # Only starts when COMPOSE_PROFILES=local-db is set.
  # Leave unset when using a managed database (e.g. Neon).
  # ----------------------------------------------------------
  db:
    profiles: ["local-db"]
    image: postgres:17-alpine
    container_name: ${STACK_NAME:-weftmark}_db
    networks:
      - internal
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  public:
    name: ${STACK_NAME:-weftmark}_public
    driver: bridge
  internal:
    name: ${STACK_NAME:-weftmark}_internal
    driver: bridge

volumes:
  postgres_data:
    name: ${STACK_NAME:-weftmark}_postgres_data
  uploads:
    name: ${STACK_NAME:-weftmark}_uploads
