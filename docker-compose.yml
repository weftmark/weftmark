services:

  # ----------------------------------------------------------
  # Frontend — React application served via nginx
  # Entry point for all user traffic; traefik routes to it via
  # the traefik_proxy network.  Proxies /api/, /auth/, and
  # /health to the backend over the internal public network.
  # ----------------------------------------------------------
  frontend:
    image: ghcr.io/weftmark/weftmark-frontend:${IMAGE_TAG:-latest}
    container_name: ${STACK_NAME:-weftmark}_frontend
    networks:
      - traefik_proxy
      - public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${STACK_NAME:-weftmark}.rule=${TRAEFIK_HOST_RULE}"
      - "traefik.http.routers.${STACK_NAME:-weftmark}.entrypoints=websecure"
      - "traefik.http.routers.${STACK_NAME:-weftmark}.tls.certresolver=cloudflare"
      - "traefik.http.services.${STACK_NAME:-weftmark}.loadbalancer.server.port=80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # Reachable by the frontend via the public network; reaches
  # Redis and (optionally) the local db via the internal network.
  # Not directly exposed — traefik routes through the frontend.
  # ----------------------------------------------------------
  backend:
    image: ghcr.io/weftmark/weftmark-backend:${IMAGE_TAG:-latest}
    container_name: ${STACK_NAME:-weftmark}_backend
    networks:
      - public
      - internal
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ----------------------------------------------------------
  # Celery worker — background task processor
  # Uses the same backend image; runs the Celery worker instead
  # of uvicorn.  Shares the uploads volume with the backend.
  # ----------------------------------------------------------
  worker:
    image: ghcr.io/weftmark/weftmark-backend:${IMAGE_TAG:-latest}
    container_name: ${STACK_NAME:-weftmark}_worker
    entrypoint: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    networks:
      - internal
    volumes:
      - uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
        required: false
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis — Celery broker and result backend
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ${STACK_NAME:-weftmark}_redis
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ----------------------------------------------------------
  # Database — PostgreSQL (optional, local-db profile only)
  # Only starts when COMPOSE_PROFILES=local-db is set.
  # Leave unset when using a managed database (e.g. Neon).
  # ----------------------------------------------------------
  db:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: ${STACK_NAME:-weftmark}_db
    networks:
      - internal
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  traefik_proxy:
    external: true
    name: traefik_proxy
  public:
    name: ${STACK_NAME:-weftmark}_public
    driver: bridge
  internal:
    name: ${STACK_NAME:-weftmark}_internal
    driver: bridge

volumes:
  postgres_data:
    name: ${STACK_NAME:-weftmark}_postgres_data
  uploads:
    name: ${STACK_NAME:-weftmark}_uploads
