services:

  # ----------------------------------------------------------
  # Frontend — React application served via nginx
  # Entry point for all user traffic. Proxies /api/, /auth/,
  # and /health to the backend over the public network.
  # Exposed: yes (port 3000 — user access)
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - public
    depends_on:
      - backend
    restart: unless-stopped

  # ----------------------------------------------------------
  # Backend — FastAPI application
  # Reachable only through the nginx proxy; not exposed to host.
  # Connected to both networks so nginx can reach it (public)
  # and it can reach db/redis (internal).
  # Exposed: no
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - public
      - internal
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  # ----------------------------------------------------------
  # Worker — Celery background task processor
  # Handles: WIF rendering, PDF export, report generation
  # No inbound connections needed; internal network only.
  # Exposed: no
  # ----------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.worker worker --loglevel=info
    networks:
      - internal
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped

  # ----------------------------------------------------------
  # Database — PostgreSQL
  # Hosts both the application database and the Authentik database.
  # Never exposed to host or public network.
  # Exposed: no
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    networks:
      - internal
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # Redis — Broker for Celery and application caching
  # Never exposed to host or public network.
  # Exposed: no
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------
  # Authentik Server — OIDC identity provider
  # Browser must reach it directly for the OIDC authorization
  # redirect, so it is port-bound on the host.
  # Connected to both networks: public (port binding) and
  # internal (db/redis access).
  # Exposed: yes (port 9000 — OIDC flow, admin UI)
  # ----------------------------------------------------------
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.12.1
    command: server
    networks:
      - public
      - internal
    env_file:
      - .env
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRESQL__USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
    ports:
      - "9000:9000"
      - "9443:9443"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
    restart: unless-stopped

  # ----------------------------------------------------------
  # Authentik Worker — Background task processor for Authentik
  # Internal only; no inbound connections needed.
  # Exposed: no
  # ----------------------------------------------------------
  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.12.1
    command: worker
    networks:
      - internal
    env_file:
      - .env
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: db
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_POSTGRESQL__USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRESQL__PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
    restart: unless-stopped


networks:
  public:
    driver: bridge
  internal:
    driver: bridge


volumes:
  postgres_data:
  redis_data:
  uploads:
  authentik_media:
  authentik_certs:
