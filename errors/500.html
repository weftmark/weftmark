<!DOCTYPE html>
<html lang="en">

<body class="min-h-screen flex flex-col bg-stone-50 text-stone-900">

          <ellipse cx="100" cy="36" rx="90" ry="30" fill="currentColor" />

      <a href="/" class="mt-8 inline-block rounded-md bg-zinc-800 px-6 py-2.5 text-sm font-medium text-stone-50 transition-colors hover:bg-zinc-700">

  <footer class="py-6 text-center text-xs text-stone-400">

</html>
