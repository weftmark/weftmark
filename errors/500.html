<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Server error — weftmark</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background-color: #fafaf9;
      color: #0c0a09;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: rgba(250, 250, 249, 0.95);
      padding: 1rem 1.5rem;
      box-shadow: 0 1px 3px rgba(12, 10, 9, 0.06);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 72rem;
      margin: 0 auto;
      display: flex;
      align-items: center;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      text-decoration: none;
      color: inherit;
    }

    .logo-wrap svg {
      height: 1.75rem;
      width: auto;
      color: #27272a;
    }

    .logo-text {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      color: #27272a;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      text-align: center;
      max-width: 28rem;
    }

    .badge {
      display: inline-block;
      background-color: #fef3c7;
      color: #b45309;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.875rem;
      border-radius: 9999px;
      margin-bottom: 1.25rem;
    }

    .error-code {
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #0c0a09;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #0c0a09;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      color: #57534e;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-block;
      background-color: #27272a;
      color: #fafaf9;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.625rem 1.5rem;
      border-radius: 0.375rem;
      text-decoration: none;
      transition: background-color 0.15s;
    }

    .btn:hover { background-color: #3f3f46; }

    footer {
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8125rem;
      color: #a8a29e;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo-wrap">
        <svg viewBox="0 0 200 72" xmlns="http://www.w3.org/2000/svg" aria-label="weftmark" role="img">
          <ellipse cx="100" cy="36" rx="90" ry="30" fill="currentColor" />
          <polyline points="55,24 75,50 100,34 125,50 145,24" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span class="logo-text">weftmark</span>
      </a>
    </div>
  </header>

  <main>
    <div class="card">
      <span class="badge">5xx</span>
      <div class="error-code">500</div>
      <h1>Something went wrong</h1>
      <p>We're having trouble on our end. Please try again in a moment.</p>
      <a href="/" class="btn">Back to home</a>
    </div>
  </main>

  <footer>
    &copy; weftmark
  </footer>
</body>
</html>
