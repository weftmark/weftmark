name: Dev CI

# PR to dev  — runs full validation suite (satisfies branch protection).
# Push to dev — runs SBOM update and version bump after a PR merges.
#
# [skip steps] in a commit message: all validation steps are skipped but
#   jobs still complete — satisfies branch protection for docs-only commits.
# Bot push detection: when weftmark-bot[bot] pushes (version bumps, SBOM),
#   runner-check sets skip=true so no validation or post-merge jobs re-run.
#
# Required secrets:
#   WEFTMARK_BOT_CLIENT_ID   — GitHub App client ID
#   WEFTMARK_BOT_PRIVATE_KEY — GitHub App private key

on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

concurrency:
  group: dev-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ------------------------------------------------------------------
  # Smoke test + skip detection
  # Propagates `skip` output to all validation jobs so docs-only
  # commits can pass branch protection without running expensive steps.
  # ------------------------------------------------------------------
  runner-check:
    name: Runner smoke test
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect-skip.outputs.skip }}
    steps:
      - name: Detect skip-steps marker or bot push
        id: detect-skip
        run: |
          if [[ "${{ github.event_name }}" == "push" && \
                "${{ github.actor }}" == "weftmark-bot[bot]" ]]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && \
                  "${{ contains(github.event.head_commit.message, '[skip steps]') }}" == "true" ]]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate bot token
        id: app-token
        if: steps.detect-skip.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        if: steps.detect-skip.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate bot token
        if: steps.detect-skip.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          [ "$HTTP" = "200" ] || { echo "Bot token invalid (HTTP $HTTP)"; exit 1; }
          echo "Bot token valid (HTTP $HTTP)"

  # ------------------------------------------------------------------
  # Validation — runs on every PR and push (respects skip flag)
  # ------------------------------------------------------------------
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - if: needs.runner-check.outputs.skip != 'true'
        run: pip install ruff==0.15.11
      - if: needs.runner-check.outputs.skip != 'true'
        run: ruff check backend/
      - if: needs.runner-check.outputs.skip != 'true'
        run: ruff format --check backend/

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm ci
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm run lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint, runner-check]
    steps:
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm ci
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npx tsc -b --noEmit

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      !(github.event_name == 'push' && github.actor == 'weftmark-bot[bot]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core
      - run: cd backend && python -m pytest tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

  migration-smoke-test:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      !(github.event_name == 'push' && github.actor == 'weftmark-bot[bot]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production
      - run: cd backend && alembic check
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production

  dependency-audit-backend:
    name: Dependency audit — backend (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend-tests, migration-smoke-test]
    if: >-
      !(github.event_name == 'push' && github.actor == 'weftmark-bot[bot]')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit && pip-audit -r backend/requirements.txt

  dependency-audit-frontend:
    name: Dependency audit — frontend (npm audit)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    if: >-
      !(github.event_name == 'push' && github.actor == 'weftmark-bot[bot]')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm audit --audit-level=high

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [runner-check, backend-lint]
    if: >-
      needs.runner-check.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f backend/Dockerfile -t weaving-backend-check .

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [runner-check, frontend-typecheck]
    if: >-
      needs.runner-check.outputs.skip != 'true'
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend

  # ------------------------------------------------------------------
  # Post-merge jobs — push to dev only, skip bot commits
  # ------------------------------------------------------------------
  sbom-backend:
    name: SBOM backend (CycloneDX + pip-licenses)
    runs-on: ubuntu-latest
    needs: [dependency-audit-backend]
    if: >-
      github.event_name == 'push' &&
      github.actor != 'weftmark-bot[bot]'
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Detect backend package changes
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep -q "^backend/requirements" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate backend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          pip install cyclonedx-bom pip-licenses
          pip install -r backend/requirements.txt
          mkdir -p sbom
          cyclonedx-py requirements backend/requirements.txt \
            --output-format JSON --output-file sbom/sbom-backend.json
          pip-licenses --format=json --output-file sbom/licenses-backend.json

      - name: Commit if changed
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name  "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"
          git add sbom/sbom-backend.json sbom/licenses-backend.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update backend SBOM and license manifest"
            git pull --rebase origin dev
            git push origin dev
          fi

      - uses: actions/upload-artifact@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          name: sbom-backend-${{ github.sha }}
          path: sbom/sbom-backend.json
          retention-days: 90

  sbom-frontend:
    name: SBOM frontend (CycloneDX + license-checker)
    runs-on: ubuntu-latest
    needs: [dependency-audit-frontend]
    if: >-
      github.event_name == 'push' &&
      github.actor != 'weftmark-bot[bot]'
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Detect frontend package changes
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep -qE "^frontend/package(-lock)?\.json" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate frontend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd frontend && npm ci
          mkdir -p ../sbom
          npx @cyclonedx/cyclonedx-npm \
            --output-format JSON --output-file ../sbom/sbom-frontend.json
          npx license-checker --json --out ../sbom/licenses-frontend.json

      - name: Commit if changed
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name  "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"
          git add sbom/sbom-frontend.json sbom/licenses-frontend.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update frontend SBOM and license manifest"
            git pull --rebase origin dev
            git push origin dev
          fi

      - uses: actions/upload-artifact@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          name: sbom-frontend-${{ github.sha }}
          path: sbom/sbom-frontend.json
          retention-days: 90

  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend, dependency-audit-backend, dependency-audit-frontend]
    if: >-
      github.event_name == 'push' &&
      github.actor != 'weftmark-bot[bot]'
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"

      - name: Determine and apply version bump
        id: version
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          with open("VERSION") as f:
              current = f.read().strip()
          major, minor, patch = map(int, current.split("."))

          result = subprocess.run(
              ["git", "describe", "--tags", "--abbrev=0"],
              capture_output=True, text=True
          )
          last_tag = result.stdout.strip() if result.returncode == 0 else None

          if last_tag:
              log = subprocess.run(
                  ["git", "log", f"{last_tag}..HEAD", "--first-parent", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout
          else:
              log = subprocess.run(
                  ["git", "log", "--first-parent", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout

          breaking = bool(
              re.search(r"^BREAKING CHANGE:", log, re.MULTILINE) or
              re.search(r"^[a-z]+!:", log, re.MULTILINE)
          )
          has_feat = bool(re.search(r"^feat(\(.*?\))?:", log, re.MULTILINE))

          if breaking:
              bump = "major"
          elif has_feat:
              bump = "minor"
          else:
              bump = "patch"

          if bump == "major":
              new_ver = f"{major + 1}.0.0"
          elif bump == "minor":
              new_ver = f"{major}.{minor + 1}.0"
          else:
              new_ver = f"{major}.{minor}.{patch + 1}"

          tag = f"v{new_ver}-dev"
          print(f"Bump: {bump}  ({current} → {new_ver})")

          with open("VERSION", "w") as f:
              f.write(new_ver + "\n")

          pkg = open("frontend/package.json").read()
          pkg = re.sub(r'("version"\s*:\s*")[^"]+(")', rf'\g<1>{new_ver}\2', pkg)
          open("frontend/package.json", "w").write(pkg)

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh_out:
              gh_out.write(f"new_version={new_ver}\n")
              gh_out.write(f"tag={tag}\n")
          PYEOF

      - name: Commit version files
        run: |
          git add VERSION frontend/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"

      - name: Push version commit
        run: |
          git pull --rebase origin dev
          git push origin dev

      - name: Create tag via API (produces Verified tag)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
            --method POST \
            --field tag="${{ steps.version.outputs.tag }}" \
            --field message="Release ${{ steps.version.outputs.tag }}" \
            --field object="$COMMIT_SHA" \
            --field type="commit" \
            --jq '.sha')
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            --field ref="refs/tags/${{ steps.version.outputs.tag }}" \
            --field sha="$TAG_SHA"
