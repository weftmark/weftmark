name: Dev PR

# Full validation suite for every PR targeting dev.
# This is the gate — tests only need to run here, not again after merge.
#
# Required secrets:
#   WEFTMARK_BOT_CLIENT_ID   — GitHub App client ID
#   WEFTMARK_BOT_PRIVATE_KEY — GitHub App private key

on:
  pull_request:
    branches: [dev]

concurrency:
  group: dev-pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.11
      - run: ruff check backend/
      - run: ruff format --check backend/

  semgrep:
    name: Semgrep semantic analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Scan backend
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/secrets \
            --exclude-rule python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure \
            --error \
            backend/app
      - name: Scan frontend
        run: |
          semgrep scan \
            --config p/react \
            --config p/typescript \
            --config p/javascript \
            --config p/secrets \
            --error \
            frontend/src

  backend-security:
    name: Backend security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit[toml]==1.8.3
      - run: cd backend && bandit -c pyproject.toml -r app/ --severity-level medium

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc -b --noEmit

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-security, semgrep]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core
      - run: cd backend && python -m pytest tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
      - run: cd backend && python -m coverage report --fail-under=65
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: weftmark/weftmark
          files: backend/coverage.xml
          fail_ci_if_error: false

  migration-smoke-test:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
      - run: cd backend && alembic check
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

  dependency-audit-backend:
    name: Dependency audit — backend (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend-tests, migration-smoke-test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit && pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2025-183

  dependency-audit-frontend:
    name: Dependency audit — frontend (npm audit)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm audit --audit-level=high

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f backend/Dockerfile -t weaving-backend-check .

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend
