name: Publish Dev Images

# Manual trigger only — publishes :{version}-dev and :dev tags to ghcr.io,
# then opens a QA issue consolidating the test plans from all PRs merged
# since the previous dev tag.
#
# Required secrets:
#   CLERK_PUBLISHABLE_KEY_DEV secret is no longer required — key is injected at runtime

on:
  workflow_dispatch:

jobs:

  publish-backend:
    name: Publish — backend (dev)
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}-dev \
            -t ghcr.io/weftmark/weftmark-backend:dev \
            .
          docker push ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}-dev
          docker push ghcr.io/weftmark/weftmark-backend:dev

  publish-frontend:
    name: Publish — frontend (dev)
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_APP_ENV="dev" \
            --build-arg CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }} \
            -t ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}-dev \
            -t ghcr.io/weftmark/weftmark-frontend:dev \
            ./frontend
          docker push ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}-dev
          docker push ghcr.io/weftmark/weftmark-frontend:dev

  open-qa-issue:
    name: Open QA issue
    runs-on: ubuntu-latest
    needs: [publish-backend, publish-frontend]
    permissions:
      issues: write
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build QA issue body
        id: qa-body
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/build_qa_issue.py

      - name: Create QA issue
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TITLE_SUFFIX: ${{ steps.qa-body.outputs.title_suffix }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "QA: v${VERSION}-dev${TITLE_SUFFIX}" \
            --body-file qa_issue_body.md \
            --label "qa"
