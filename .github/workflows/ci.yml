name: CI

# Pipeline stages:
#
#   Backend lane:
#     runner-check → backend-lint → docker-build-backend (every PR + dev/main push)
#                               → backend-tests + migration-smoke-test
#                                  → dependency-audit-backend → sbom-backend
#
#   Frontend lane:
#     runner-check → frontend-lint → frontend-typecheck → docker-build-frontend (every PR + dev/main push)
#                                                     → dependency-audit-frontend → sbom-frontend
#
#   Converge (dev push):
#     docker-build-* + dependency-audit-* → bump-version → docker-publish-dev-*
#
#   Converge (main push):
#     docker-build-* + dependency-audit-* → promote-version-tag → docker-publish-main-*
#
# When each stage runs:
#   Lint + frontend-typecheck run on EVERY push (fast feedback on feature branches).
#   Docker builds run on EVERY PR (catch build failures early) and dev/main pushes.
#   Tests, audit, SBOM run only on push to dev/main.
#   bump-version runs only on push to dev.
#   promote-version-tag + publish run only on push to main.
#
# Add [skip steps] to any commit message to run CI but skip all meaningful steps
# (e.g. docs-only changes). All jobs complete immediately — satisfies branch protection.
# [skip ci] is reserved for bot auto-commits (version bumps, SBOM) that should not
# run CI at all. Do not use [skip ci] in manual commits.
#
# Required secrets:
#   WEFTMARK_BOT_CLIENT_ID   — GitHub App Client ID for weftmark-bot
#   WEFTMARK_BOT_PRIVATE_KEY — GitHub App private key (.pem contents)
#   CLERK_PUBLISHABLE_KEY    — Clerk publishable key (baked into frontend image at build time)
#
# Version strategy:
#   push to dev  → PATCH bump  (0.1.0 → 0.1.1), commit VERSION, tag v0.1.1-dev
#   push to main → NO bump; re-tag the current VERSION as v0.1.1 (strips -dev)
#   feat: on dev               → MINOR bump instead of PATCH
#   BREAKING CHANGE: or feat!: → MAJOR bump regardless of branch
#
# Rationale: dev is where versions are decided and tested. main just promotes
# the already-tested version. Hotfixes to main should bump manually or via a
# dedicated hotfix workflow.

on:
  push:
    branches: [main, dev, "feature/*"]
  pull_request:
    branches: [main, dev]

# Prevents duplicate runs when a feature branch push also has an open PR.
# github.head_ref is set on pull_request events (branch name e.g. feature/foo);
# it's empty on push events, so || github.ref falls back to the push ref.
# Both events for the same branch land in the same group — the later one cancels
# the earlier. cancel-in-progress is disabled on dev/main so version bumps always
# complete.
# NOTE: review this if CI behaves unexpectedly (e.g. legitimate runs being
# cancelled, version bumps skipped, or duplicate runs still appearing).
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/dev' && github.ref != 'refs/heads/main' }}

jobs:

  # ------------------------------------------------------------
  # Stage 1 — Runner sanity check
  # ------------------------------------------------------------
  runner-check:
    name: Runner smoke test
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect-skip.outputs.skip }}
    steps:
      - name: Detect skip-steps marker
        id: detect-skip
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ contains(github.event.head_commit.message, '[skip steps]') }}" == "true" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "CI steps skipped via [skip steps]"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate bot token
        id: app-token
        if: steps.detect-skip.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        if: steps.detect-skip.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate bot token
        if: steps.detect-skip.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          if [ "$HTTP" != "200" ]; then
            echo "❌ Bot token cannot read repo (HTTP $HTTP) — app may not be installed on this repo"
            exit 1
          fi
          echo "✅ Bot token valid (HTTP $HTTP) — push permission verified at the push steps"

      - name: Print environment info
        if: steps.detect-skip.outputs.skip != 'true'
        run: |
          echo "Runner: $(uname -a)"
          echo "Event:  ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Python: $(python3 --version)"
          echo "Docker: $(docker --version 2>/dev/null || echo 'not available')"

      - name: Confirm repo structure
        if: steps.detect-skip.outputs.skip != 'true'
        run: |
          echo "=== Backend ==="
          ls backend/
          echo "=== Tests ==="
          ls backend/tests/services/

  # ============================================================
  # BACKEND LANE
  # ============================================================

  # ------------------------------------------------------------
  # Stage 2 — Backend lint (every push + PR)
  # ------------------------------------------------------------
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - name: Check out code
        if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        if: needs.runner-check.outputs.skip != 'true'
        run: pip install ruff==0.15.11

      - name: Ruff lint
        if: needs.runner-check.outputs.skip != 'true'
        run: ruff check backend/

      - name: Ruff format check
        if: needs.runner-check.outputs.skip != 'true'
        run: ruff format --check backend/

  # ------------------------------------------------------------
  # Stage 3 — Backend tests + migration smoke (dev/main push only)
  # ------------------------------------------------------------
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      (github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install fonts (required by PyWeaving renderer)
        run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Run pytest
        run: cd backend && python -m pytest tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

  migration-smoke-test:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      (github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations (upgrade head)
        run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production

      - name: Verify no pending migrations (alembic check)
        run: cd backend && alembic check
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production

  # ------------------------------------------------------------
  # Stage 4 — Backend dependency audit (dev/main push only)
  # ------------------------------------------------------------
  dependency-audit-backend:
    name: Dependency audit — backend (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend-tests, migration-smoke-test]
    if: >-
      (github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip-audit (production deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

  # ------------------------------------------------------------
  # Stage 5 — Backend SBOM + Docker build (parallel)
  # SBOM: dev/main push only
  # Docker build: every PR + dev/main push (catches build failures early)
  # ------------------------------------------------------------
  sbom-backend:
    name: SBOM backend (CycloneDX + pip-licenses)
    runs-on: ubuntu-latest
    needs: [dependency-audit-backend]
    if: >-
      (github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Detect backend package changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE=""
          fi
          if [ -z "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only "$BASE" HEAD | grep -q "^backend/requirements" \
              && echo "changed=true"  >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate backend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          pip install cyclonedx-bom pip-licenses
          pip install -r backend/requirements.txt
          mkdir -p sbom
          cyclonedx-py requirements backend/requirements.txt \
            --output-format JSON \
            --output-file sbom/sbom-backend.json
          pip-licenses --format=json --output-file sbom/licenses-backend.json

      - name: Commit backend manifests if changed
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'push' && github.ref_name == 'dev'
        run: |
          git config user.name "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"
          git add sbom/sbom-backend.json sbom/licenses-backend.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update backend SBOM and license manifest [skip ci]"
            git pull --rebase origin dev
            git push origin dev
          fi

      - name: Upload backend manifests
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: sbom-backend-${{ github.sha }}
          path: |
            sbom/sbom-backend.json
            sbom/licenses-backend.json
          retention-days: 90

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [runner-check, backend-lint]
    if: >-
      needs.runner-check.outputs.skip != 'true' &&
      (
        github.event_name == 'pull_request' ||
        (
          (github.ref_name == 'dev' || github.ref_name == 'main') &&
          !contains(github.event.head_commit.message || '', '[skip ci]')
        )
      )
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t weaving-backend-check .

  # ============================================================
  # FRONTEND LANE
  # ============================================================

  # ------------------------------------------------------------
  # Stage 2 — Frontend lint (every push + PR)
  # ------------------------------------------------------------
  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - name: Check out code
        if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Set up Node
        if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm ci

      - name: ESLint
        if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm run lint

  # ------------------------------------------------------------
  # Stage 3 — Frontend typecheck (every push + PR)
  # ------------------------------------------------------------
  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint, runner-check]
    steps:
      - name: Check out code
        if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Set up Node
        if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm ci

      - name: Type check
        if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npx tsc -b --noEmit

  # ------------------------------------------------------------
  # Stage 4 — Frontend dependency audit (dev/main push only)
  # ------------------------------------------------------------
  dependency-audit-frontend:
    name: Dependency audit — frontend (npm audit)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    if: >-
      (github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: npm audit (high+ only)
        run: cd frontend && npm ci && npm audit --audit-level=high

  # ------------------------------------------------------------
  # Stage 5 — Frontend SBOM + Docker build (parallel)
  # SBOM: dev/main push only
  # Docker build: every PR + dev/main push (catches build failures early)
  # ------------------------------------------------------------
  sbom-frontend:
    name: SBOM frontend (CycloneDX + license-checker)
    runs-on: ubuntu-latest
    needs: [dependency-audit-frontend]
    if: >-
      (github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Detect frontend package changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE=""
          fi
          if [ -z "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only "$BASE" HEAD | grep -qE "^frontend/package(-lock)?\.json" \
              && echo "changed=true"  >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate frontend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd frontend && npm ci
          mkdir -p ../sbom
          npx @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-frontend.json
          npx license-checker --json --out ../sbom/licenses-frontend.json

      - name: Commit frontend manifests if changed
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'push' && github.ref_name == 'dev'
        run: |
          git config user.name "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"
          git add sbom/sbom-frontend.json sbom/licenses-frontend.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update frontend SBOM and license manifest [skip ci]"
            git pull --rebase origin dev
            git push origin dev
          fi

      - name: Upload frontend manifests
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: sbom-frontend-${{ github.sha }}
          path: |
            sbom/sbom-frontend.json
            sbom/licenses-frontend.json
          retention-days: 90

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [runner-check, frontend-typecheck]
    if: >-
      needs.runner-check.outputs.skip != 'true' &&
      (
        github.event_name == 'pull_request' ||
        (
          (github.ref_name == 'dev' || github.ref_name == 'main') &&
          !contains(github.event.head_commit.message || '', '[skip ci]')
        )
      )
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend

  # ============================================================
  # CONVERGENCE
  # ============================================================

  # ------------------------------------------------------------
  # Stage 6a — Version bump (dev push only)
  # Bumps VERSION, commits, and tags v{new}-dev.
  # Waits for both docker builds AND dependency audits to pass.
  # ------------------------------------------------------------
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend, dependency-audit-backend, dependency-audit-frontend]
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"

      - name: Determine and apply version bump
        id: version
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          # ── Read current version ──────────────────────────────────────────
          with open("VERSION") as f:
              current = f.read().strip()
          major, minor, patch = map(int, current.split("."))

          # ── Collect commits since last tag ────────────────────────────────
          result = subprocess.run(
              ["git", "describe", "--tags", "--abbrev=0"],
              capture_output=True, text=True
          )
          last_tag = result.stdout.strip() if result.returncode == 0 else None

          if last_tag:
              log = subprocess.run(
                  ["git", "log", f"{last_tag}..HEAD", "--first-parent", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout
          else:
              log = subprocess.run(
                  ["git", "log", "--first-parent", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout

          # ── Determine bump level ──────────────────────────────────────────
          breaking = bool(
              re.search(r"^BREAKING CHANGE:", log, re.MULTILINE) or
              re.search(r"^[a-z]+!:", log, re.MULTILINE)
          )
          has_feat = bool(re.search(r"^feat(\(.*?\))?:", log, re.MULTILINE))

          if breaking:
              bump = "major"
          elif has_feat:
              bump = "minor"
          else:
              bump = "patch"

          # ── Compute new version ───────────────────────────────────────────
          if bump == "major":
              new_ver = f"{major + 1}.0.0"
          elif bump == "minor":
              new_ver = f"{major}.{minor + 1}.0"
          else:
              new_ver = f"{major}.{minor}.{patch + 1}"

          tag = f"v{new_ver}-dev"

          print(f"Bump:  {bump}  ({current} → {new_ver})")
          print(f"Tag:   {tag}")

          # ── Update VERSION ────────────────────────────────────────────────
          with open("VERSION", "w") as f:
              f.write(new_ver + "\n")

          # ── Update frontend/package.json ──────────────────────────────────
          pkg = open("frontend/package.json").read()
          pkg = re.sub(
              r'("version"\s*:\s*")[^"]+(")',
              rf'\g<1>{new_ver}\2',
              pkg
          )
          open("frontend/package.json", "w").write(pkg)

          # ── Write outputs for subsequent steps ────────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh_out:
              gh_out.write(f"new_version={new_ver}\n")
              gh_out.write(f"tag={tag}\n")

          PYEOF

      - name: Commit version files
        run: |
          git add VERSION frontend/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"

      - name: Push version commit
        run: |
          git pull --rebase origin dev
          git push origin dev

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

  # ------------------------------------------------------------
  # Stage 6b — Promote version tag (main push only)
  # No version bump — re-tags the current VERSION as v{ver}
  # (strips the -dev suffix set when the feature landed on dev).
  # Waits for both docker builds AND dependency audits to pass.
  # ------------------------------------------------------------
  promote-version-tag:
    name: Promote version tag
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend, dependency-audit-backend, dependency-audit-frontend]
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"

      - name: Read current version and create production tag
        run: |
          VERSION=$(cat VERSION)
          TAG="v${VERSION}"
          echo "Version: ${VERSION}"
          echo "Tag:     ${TAG}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping creation"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

  # ------------------------------------------------------------
  # Stage 7a — Publish dev images (dev push only)
  # Runs after bump-version; checks out post-bump dev HEAD.
  # Publishes :{version}-dev and :dev tags to ghcr.io.
  # ------------------------------------------------------------
  docker-publish-dev-backend:
    name: Publish — backend (dev)
    runs-on: ubuntu-latest
    needs: [bump-version]
    permissions:
      packages: write
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code (post-bump)
        uses: actions/checkout@v6
        with:
          ref: dev

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}-dev \
            -t ghcr.io/weftmark/weftmark-backend:dev \
            .
          docker push ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}-dev
          docker push ghcr.io/weftmark/weftmark-backend:dev

  docker-publish-dev-frontend:
    name: Publish — frontend (dev)
    runs-on: ubuntu-latest
    needs: [bump-version]
    permissions:
      packages: write
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code (post-bump)
        uses: actions/checkout@v6
        with:
          ref: dev

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            --build-arg VITE_APP_ENV="dev" \
            -t ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}-dev \
            -t ghcr.io/weftmark/weftmark-frontend:dev \
            ./frontend
          docker push ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}-dev
          docker push ghcr.io/weftmark/weftmark-frontend:dev

  # ------------------------------------------------------------
  # Stage 7b — Publish production images (main push only)
  # Runs after promote-version-tag; reads VERSION from main HEAD.
  # Publishes :{version} and :latest tags to ghcr.io.
  # ------------------------------------------------------------
  docker-publish-main-backend:
    name: Publish — backend (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }} \
            -t ghcr.io/weftmark/weftmark-backend:latest \
            .
          docker push ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}
          docker push ghcr.io/weftmark/weftmark-backend:latest

  docker-publish-main-frontend:
    name: Publish — frontend (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY }}" \
            --build-arg VITE_APP_ENV="production" \
            -t ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }} \
            -t ghcr.io/weftmark/weftmark-frontend:latest \
            ./frontend
          docker push ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}
          docker push ghcr.io/weftmark/weftmark-frontend:latest
