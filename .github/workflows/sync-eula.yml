name: Sync EULA to migration

on:
  workflow_dispatch:

jobs:
  sync-eula:
    runs-on: ubuntu-latest

    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Checkout dev
        uses: actions/checkout@v6
        with:
          ref: dev
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run export script
        id: export
        run: |
          output=$(python tools/export_eula_migration.py --api-url "${{ secrets.EULA_API_URL }}" 2>&1)
          echo "$output"
          written=$(echo "$output" | grep '^Written:' | awk '{print $2}')
          if [ -z "$written" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            first_file=$(echo "$written" | head -1)
            version=$(grep -oP "version='\K[^']+" "$first_file" | head -1)
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push branch
        if: steps.export.outputs.has_changes == 'true'
        run: |
          git config user.name "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"
          branch="chore/sync-eula-${{ steps.export.outputs.version }}"
          git checkout -b "$branch"
          git add backend/alembic/versions/
          git commit -m "chore: persist EULA version ${{ steps.export.outputs.version }} to migrations [skip ci]"
          git push origin "$branch" --force

      - name: Open pull request
        if: steps.export.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ steps.export.outputs.version }}"
          gh pr create \
            --title "chore: sync EULA version ${VERSION} to migrations" \
            --body "$(printf 'Auto-generated by the **sync-eula** workflow.\n\nAdds the Alembic migration for EULA version `%s` fetched from the live API endpoint.' "${VERSION}")" \
            --base dev \
            --head "chore/sync-eula-${VERSION}"

      - name: Nothing to do
        if: steps.export.outputs.has_changes == 'false'
        run: echo "No new EULA versions found — all migrations are up to date."
