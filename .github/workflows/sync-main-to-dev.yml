name: Sync main → dev

on:
  push:
    branches: [main]

concurrency:
  group: sync-main-to-dev
  cancel-in-progress: false

jobs:
  sync:
    name: Open main→dev sync PR
    runs-on: ubuntu-latest
    if: github.actor != 'weftmark-bot[bot]'
    permissions:
      pull-requests: write

    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Check if main has commits not in dev
        id: check
        run: |
          git fetch origin dev
          AHEAD=$(git log origin/dev..HEAD --oneline | wc -l | tr -d ' ')
          echo "ahead=${AHEAD}" >> $GITHUB_OUTPUT
          echo "main is ${AHEAD} commit(s) ahead of dev"

      - name: Open sync PR (skip if already open or nothing to sync)
        if: steps.check.outputs.ahead != '0'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          EXISTING=$(gh pr list --base dev --head main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Sync PR #${EXISTING} already open — skipping"
            exit 0
          fi
          gh pr create \
            --base dev \
            --head main \
            --title "chore: sync main → dev" \
            --body "Automated sync of main back to dev after merge. Generated by sync-main-to-dev workflow."
