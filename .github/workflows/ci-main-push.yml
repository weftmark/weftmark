name: Main push

# ============================================================
# NO FILE WRITES POLICY — this workflow must never commit or
# push files back to the repository.
#
# Allowed:  verify, build, create git tags via API, publish
#           images to ghcr.io, upload Actions artifacts.
# Forbidden: git commit, git push, auto-committing SBOMs,
#            version bumps, lockfile updates, or any other
#            file write of any kind.
#
# If a generated artifact (SBOM, snapshot, etc.) is stale,
# this workflow MUST FAIL — not auto-fix. The fix must be
# implemented on dev or a hotfix/* branch and merged via PR.
#
# The no-write-guard job in ci-main-pr.yml enforces this at PR time.
# ============================================================
#
# Delivery pipeline — runs after a PR merges into main.
# Promotes the version tag, generates SBOM artifacts, and
# publishes versioned + :latest images to ghcr.io.
#
# Required secrets:
#   WEFTMARK_BOT_CLIENT_ID        — GitHub App client ID
#   WEFTMARK_BOT_PRIVATE_KEY      — GitHub App private key
#   CLERK_PUBLISHABLE_KEY_PROD secret is no longer required — key is injected at runtime

on:
  push:
    branches: [main]

concurrency:
  group: main-push-${{ github.ref }}
  cancel-in-progress: false

jobs:

  promote-version-tag:
    name: Promote version tag
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Create production tag via API (idempotent, produces Verified tag)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(cat VERSION)
          TAG="v${VERSION}"
          echo "Version: ${VERSION}"
          echo "Tag:     ${TAG}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping creation"
          else
            COMMIT_SHA=$(git rev-parse HEAD)
            TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
              --method POST \
              --field tag="${TAG}" \
              --field message="Release ${TAG}" \
              --field object="$COMMIT_SHA" \
              --field type="commit" \
              --jq '.sha')
            gh api repos/${{ github.repository }}/git/refs \
              --method POST \
              --field ref="refs/tags/${TAG}" \
              --field sha="$TAG_SHA"
            echo "Tag ${TAG} created"
          fi

  sbom-backend:
    name: SBOM backend (CycloneDX + pip-licenses)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect backend package changes
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep -q "^backend/requirements" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate backend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          pip install cyclonedx-bom pip-licenses
          pip install -r backend/requirements.txt
          mkdir -p sbom
          cyclonedx-py requirements backend/requirements.txt \
            --output-format JSON --output-file sbom/sbom-backend.json
          pip-licenses --format=json --output-file sbom/licenses-backend.json

      - uses: actions/upload-artifact@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          name: sbom-backend-${{ github.sha }}
          path: |
            sbom/sbom-backend.json
            sbom/licenses-backend.json
          retention-days: 90

  sbom-frontend:
    name: SBOM frontend (CycloneDX + license-checker)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect frontend package changes
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep -qE "^frontend/package(-lock)?\.json" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate frontend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd frontend && npm ci
          mkdir -p ../sbom
          npx @cyclonedx/cyclonedx-npm \
            --output-format JSON --output-file ../sbom/sbom-frontend.json
          npx license-checker --json --out ../sbom/licenses-frontend.json

      - uses: actions/upload-artifact@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          name: sbom-frontend-${{ github.sha }}
          path: |
            sbom/sbom-frontend.json
            sbom/licenses-frontend.json
          retention-days: 90

  docker-publish-backend:
    name: Publish — backend (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }} \
            -t ghcr.io/weftmark/weftmark-backend:latest \
            .
          docker push ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}
          docker push ghcr.io/weftmark/weftmark-backend:latest

  docker-publish-frontend:
    name: Publish — frontend (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_APP_ENV="production" \
            --build-arg CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }} \
            -t ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }} \
            -t ghcr.io/weftmark/weftmark-frontend:latest \
            ./frontend
          docker push ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}
          docker push ghcr.io/weftmark/weftmark-frontend:latest

  docker-publish-errors:
    name: Publish — error pages (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push errors image
        run: |
          docker build -f errors/Dockerfile \
            -t ghcr.io/weftmark/weftmark-errors:latest \
            .
          docker push ghcr.io/weftmark/weftmark-errors:latest
