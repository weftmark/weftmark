name: Feature CI

# Runs on every push to feature/* and fix/* branches.
# Provides fast lint/typecheck feedback before a PR is opened.
# Full test suite runs when the PR is opened (ci-dev-pr.yml).
# Hotfix branches use ci-hotfix.yml (full suite) because they target main directly.

on:
  push:
    branches: ["feature/*", "fix/*"]

concurrency:
  group: feature-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.11
      - run: ruff check backend/
      - run: ruff format --check backend/

  backend-typecheck:
    name: Backend type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install mypy==2.1.0 types-passlib types-python-dateutil
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m mypy app/

  semgrep:
    name: Semgrep semantic analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install semgrep
      - name: Scan backend
        run: |
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/secrets \
            --exclude-rule python.lang.security.audit.logging.logger-credential-leak.python-logger-credential-disclosure \
            --error \
            backend/app
      - name: Scan frontend
        run: |
          semgrep scan \
            --config p/react \
            --config p/typescript \
            --config p/javascript \
            --config p/secrets \
            --error \
            frontend/src

  backend-security:
    name: Backend security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit[toml]==1.8.3
      - run: cd backend && bandit -c pyproject.toml -r app/ --severity-level medium

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc -b --noEmit
