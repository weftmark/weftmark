name: Feature CI

# Runs on every push to feature/*, hotfix/*, and fix/* branches.
# Provides fast lint/typecheck feedback before a PR is opened.
# Full test suite runs when the PR is opened (ci-dev.yml or ci-main.yml).

on:
  push:
    branches: ["feature/*", "hotfix/*", "fix/*"]

concurrency:
  group: feature-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.11
      - run: ruff check backend/
      - run: ruff format --check backend/

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc -b --noEmit
