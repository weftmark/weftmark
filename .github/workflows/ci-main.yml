name: Main CI

# ============================================================
# NO FILE WRITES POLICY — this workflow must never commit or
# push files back to the repository.
#
# Allowed:  verify, build, create git tags via API, publish
#           images to ghcr.io, upload Actions artifacts.
# Forbidden: git commit, git push, auto-committing SBOMs,
#            version bumps, lockfile updates, or any other
#            file write of any kind.
#
# If a generated artifact (SBOM, snapshot, etc.) is stale,
# this workflow MUST FAIL — not auto-fix. The fix must be
# implemented on dev or a hotfix/* branch and merged via PR.
#
# The no-write-guard job below enforces this at PR time.
# ============================================================
#
# PR to main  — runs full validation suite (satisfies branch protection).
# Push to main — promote version tag, update SBOMs (artifact only, no commit),
#                and publish :{version} + :latest images to ghcr.io.
#
# [skip steps] in a commit message: all validation steps are skipped but
#   jobs still complete — satisfies branch protection for docs-only commits.
# [skip ci]   is reserved for bot commits (should not occur on main; version
#   bumps happen on dev only). All push-only jobs are guarded against it.
#
# Required secrets:
#   WEFTMARK_BOT_CLIENT_ID   — GitHub App client ID
#   WEFTMARK_BOT_PRIVATE_KEY — GitHub App private key
#   CLERK_PUBLISHABLE_KEY_PROD — Clerk publishable key for production (baked into frontend image at build time)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: main-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ------------------------------------------------------------------
  # Smoke test + skip detection
  # ------------------------------------------------------------------
  runner-check:
    name: Runner smoke test
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.detect-skip.outputs.skip }}
    steps:
      - name: Detect skip-steps marker
        id: detect-skip
        run: |
          if [[ "${{ github.event_name }}" == "push" && \
                "${{ contains(github.event.head_commit.message, '[skip steps]') }}" == "true" ]]; then
            echo "skip=true"  >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate bot token
        id: app-token
        if: steps.detect-skip.outputs.skip != 'true'
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - name: Check out code
        if: steps.detect-skip.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Validate bot token
        if: steps.detect-skip.outputs.skip != 'true'
        env:
          BOT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $BOT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          [ "$HTTP" = "200" ] || { echo "Bot token invalid (HTTP $HTTP)"; exit 1; }
          echo "Bot token valid (HTTP $HTTP)"

  # ------------------------------------------------------------------
  # No-write guard — PRs to main only
  # Rejects any ci-main.yml that contains git commit or git push.
  # ------------------------------------------------------------------
  no-write-guard:
    name: No file writes in main CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Check ci-main.yml for forbidden write commands
        run: |
          # Match only lines where git is the first shell token (command position).
          # This avoids false positives from comments, step names, and echo strings.
          HITS=$(grep -En '^\s+git (commit|push)\b' .github/workflows/ci-main.yml || true)
          if [ -n "$HITS" ]; then
            echo "ERR: ci-main.yml contains a git write command — file writes are forbidden on main CI."
            echo "$HITS"
            exit 1
          fi
          echo "ok: no git write commands found in ci-main.yml"

  # ------------------------------------------------------------------
  # Validation — runs on every PR and push (respects skip flag)
  # ------------------------------------------------------------------
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - if: needs.runner-check.outputs.skip != 'true'
        run: pip install ruff==0.15.11
      - if: needs.runner-check.outputs.skip != 'true'
        run: ruff check backend/
      - if: needs.runner-check.outputs.skip != 'true'
        run: ruff format --check backend/

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm ci
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm run lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint, runner-check]
    steps:
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/checkout@v6
      - if: needs.runner-check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npm ci
      - if: needs.runner-check.outputs.skip != 'true'
        run: cd frontend && npx tsc -b --noEmit

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      !contains(github.event.head_commit.message || '', '[skip ci]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core
      - run: cd backend && python -m pytest tests/ -v
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

  migration-smoke-test:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      !contains(github.event.head_commit.message || '', '[skip ci]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements.txt
      - run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production
      - run: cd backend && alembic check
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production

  dependency-audit-backend:
    name: Dependency audit — backend (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend-tests, migration-smoke-test]
    if: >-
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit && pip-audit -r backend/requirements.txt

  dependency-audit-frontend:
    name: Dependency audit — frontend (npm audit)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    if: >-
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm audit --audit-level=high

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [runner-check, backend-lint]
    if: >-
      needs.runner-check.outputs.skip != 'true' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f backend/Dockerfile -t weaving-backend-check .

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [runner-check, frontend-typecheck]
    if: >-
      needs.runner-check.outputs.skip != 'true' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend

  # ------------------------------------------------------------------
  # Post-merge jobs — push to main only, skip bot commits
  # ------------------------------------------------------------------
  promote-version-tag:
    name: Promote version tag
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend, dependency-audit-backend, dependency-audit-frontend]
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.WEFTMARK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.WEFTMARK_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "weftmark-bot[bot]"
          git config user.email "weftmark-bot[bot]@users.noreply.github.com"

      - name: Create production tag via API (idempotent, produces Verified tag)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION=$(cat VERSION)
          TAG="v${VERSION}"
          echo "Version: ${VERSION}"
          echo "Tag:     ${TAG}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — skipping creation"
          else
            COMMIT_SHA=$(git rev-parse HEAD)
            TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
              --method POST \
              --field tag="${TAG}" \
              --field message="Release ${TAG}" \
              --field object="$COMMIT_SHA" \
              --field type="commit" \
              --jq '.sha')
            gh api repos/${{ github.repository }}/git/refs \
              --method POST \
              --field ref="refs/tags/${TAG}" \
              --field sha="$TAG_SHA"
            echo "Tag ${TAG} created"
          fi

  sbom-backend:
    name: SBOM backend (CycloneDX + pip-licenses)
    runs-on: ubuntu-latest
    needs: [dependency-audit-backend]
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect backend package changes
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep -q "^backend/requirements" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate backend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          pip install cyclonedx-bom pip-licenses
          pip install -r backend/requirements.txt
          mkdir -p sbom
          cyclonedx-py requirements backend/requirements.txt \
            --output-format JSON --output-file sbom/sbom-backend.json
          pip-licenses --format=json --output-file sbom/licenses-backend.json

      - uses: actions/upload-artifact@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          name: sbom-backend-${{ github.sha }}
          path: |
            sbom/sbom-backend.json
            sbom/licenses-backend.json
          retention-days: 90

  sbom-frontend:
    name: SBOM frontend (CycloneDX + license-checker)
    runs-on: ubuntu-latest
    needs: [dependency-audit-frontend]
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect frontend package changes
        id: detect
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff --name-only HEAD~1 HEAD | grep -qE "^frontend/package(-lock)?\.json" \
              && echo "changed=true" >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate frontend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd frontend && npm ci
          mkdir -p ../sbom
          npx @cyclonedx/cyclonedx-npm \
            --output-format JSON --output-file ../sbom/sbom-frontend.json
          npx license-checker --json --out ../sbom/licenses-frontend.json

      - uses: actions/upload-artifact@v6
        if: steps.detect.outputs.changed == 'true'
        with:
          name: sbom-frontend-${{ github.sha }}
          path: |
            sbom/sbom-frontend.json
            sbom/licenses-frontend.json
          retention-days: 90

  docker-publish-main-backend:
    name: Publish — backend (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          docker build -f backend/Dockerfile \
            -t ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }} \
            -t ghcr.io/weftmark/weftmark-backend:latest \
            .
          docker push ghcr.io/weftmark/weftmark-backend:${{ steps.version.outputs.version }}
          docker push ghcr.io/weftmark/weftmark-backend:latest

  docker-publish-main-frontend:
    name: Publish — frontend (main)
    runs-on: ubuntu-latest
    needs: [promote-version-tag]
    permissions:
      packages: write
    if: >-
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - uses: actions/checkout@v6

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        run: |
          docker build -f frontend/Dockerfile \
            --build-arg VITE_CLERK_PUBLISHABLE_KEY="${{ secrets.CLERK_PUBLISHABLE_KEY_PROD }}" \
            --build-arg VITE_APP_ENV="production" \
            -t ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }} \
            -t ghcr.io/weftmark/weftmark-frontend:latest \
            ./frontend
          docker push ghcr.io/weftmark/weftmark-frontend:${{ steps.version.outputs.version }}
          docker push ghcr.io/weftmark/weftmark-frontend:latest
