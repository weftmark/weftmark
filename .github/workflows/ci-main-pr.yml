name: Main PR

# Validates PRs targeting main. No tests — code arriving here from dev was
# already fully tested on the PR to dev. Hotfix branches were tested by
# ci-hotfix.yml on every push before this PR was opened.
#
# This workflow verifies the production build (different Clerk key baked in),
# runs a fresh dep audit, and enforces the no-write policy.
#
# Required secrets:
#   WEFTMARK_BOT_CLIENT_ID   — GitHub App client ID
#   WEFTMARK_BOT_PRIVATE_KEY — GitHub App private key

on:
  pull_request:
    branches: [main]

concurrency:
  group: main-pr-${{ github.head_ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # NO FILE WRITES POLICY — this workflow must never commit or
  # push files back to the repository.
  # ============================================================
  no-write-guard:
    name: No file writes in main CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check ci-main-push.yml for forbidden write commands
        run: |
          HITS=$(grep -En '^\s+git (commit|push)\b' .github/workflows/ci-main-push.yml || true)
          if [ -n "$HITS" ]; then
            echo "ERR: ci-main-push.yml contains a git write command — file writes are forbidden on main CI."
            echo "$HITS"
            exit 1
          fi
          echo "ok: no git write commands found in ci-main-push.yml"

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.11
      - run: ruff check backend/
      - run: ruff format --check backend/

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npx tsc -b --noEmit

  dependency-audit-backend:
    name: Dependency audit — backend (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pip-audit && pip-audit -r backend/requirements.txt

  dependency-audit-frontend:
    name: Dependency audit — frontend (npm audit)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: cd frontend && npm ci && npm audit --audit-level=high

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f backend/Dockerfile -t weaving-backend-check .

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    steps:
      - uses: actions/checkout@v6
      - run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend
