# Dependabot configuration — keeps pip and npm dependencies fresh.
#
# Both ecosystems use weekly grouped updates to minimise PR volume.
# PRs target dev and run through ci-dev-pr.yml (full test suite).
#
# Auto-merge is intentionally not configured — review manually until
# the cadence and false-positive rate are understood.
#
# The version-bump job in ci-dev-push.yml guards on weftmark-bot[bot];
# Dependabot's actor is dependabot[bot] — no guard extension needed.

version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: America/Denver
    open-pull-requests-limit: 5
    target-branch: dev
    labels:
      - dependencies
      - backend
    ignore:
      # kombu[redis] (pulled in by celery[redis]) caps redis at <6.5.
      # redis 7.x cannot be used until Celery ships a compatible kombu version.
      - dependency-name: redis
        versions: [">=7.0"]
      # fastapi 0.136.3 is malicious (MAL-2026-4750) — hidden fastar typosquat dep.
      # Remove this ignore once PyPI yanks the release or a clean 0.136.4+ ships.
      - dependency-name: fastapi
        versions: ["0.136.3"]
    groups:
      backend-deps:
        patterns:
          - "*"
    assignees:
      - gx1400

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: America/Denver
    open-pull-requests-limit: 5
    target-branch: dev
    labels:
      - dependencies
      - frontend
    groups:
      frontend-deps:
        patterns:
          - "*"
    assignees:
      - gx1400
