name: CI

# Pipeline stages:
#
#   Backend lane:
#     runner-check → backend-lint → backend-tests + migration-smoke-test
#     → dependency-audit-backend → sbom-backend + docker-build-backend
#
#   Frontend lane:
#     runner-check → frontend-lint → frontend-typecheck
#     → dependency-audit-frontend → sbom-frontend + docker-build-frontend
#
#   Converge:
#     docker-build-backend + docker-build-frontend → bump-version
#
# When each stage runs:
#   Lint + frontend-typecheck run on EVERY push (fast feedback on feature branches).
#   Tests, audit, Docker, SBOM run only on pull_request or push to dev/main.
#   bump-version runs only on push to dev/main.
#
# Add [skip ci] to any commit message to skip CI entirely (e.g. docs-only changes).
# [skip ci] is ignored on pull_request events — CI always runs on PRs.
#
# Required secret: CI_TOKEN
#   A Gitea personal access token with repository: Read & Write permission.
#   Set it at: Repository → Settings → Secrets → Actions.
#
# Version strategy:
#   push to dev  → PATCH bump  (0.1.0 → 0.1.1), tag v0.1.1-dev
#   push to main → MINOR bump  (0.1.1 → 0.2.0), tag v0.2.0
#   feat: anywhere on dev      → MINOR bump instead of PATCH
#   BREAKING CHANGE: or feat!: → MAJOR bump regardless of branch

on:
  push:
    branches: [main, dev, "feature/*"]
  pull_request:
    branches: [main, dev]

jobs:

  # ------------------------------------------------------------
  # Stage 1 — Runner sanity check
  # ------------------------------------------------------------
  runner-check:
    name: Runner smoke test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_TOKEN }}

      - name: Validate CI_TOKEN permissions
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
        run: |
          if [ -z "$CI_TOKEN" ]; then
            echo "❌ CI_TOKEN secret is not set — required for checkout and version bump push"
            echo "   Create a PAT with repository read+write, then add it as CI_TOKEN in repo Settings → Actions → Secrets"
            exit 1
          fi
          HTTP=$(curl -s -o /tmp/repo_check.json -w "%{http_code}" \
            -H "Authorization: token $CI_TOKEN" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}")
          if [ "$HTTP" != "200" ]; then
            echo "❌ CI_TOKEN cannot read repo (HTTP $HTTP) — token may be expired or deleted"
            exit 1
          fi
          PUSH=$(python3 -c "import json; d=json.load(open('/tmp/repo_check.json')); print(str(d.get('permissions',{}).get('push',False)).lower())")
          if [ "$PUSH" != "true" ]; then
            echo "❌ CI_TOKEN lacks push permission — required for version bump commit in stage 6"
            echo "   Recreate the PAT with repository: Read & Write scope"
            exit 1
          fi
          echo "✅ CI_TOKEN valid — repo read + push confirmed"

      - name: Print environment info
        run: |
          echo "Runner: $(uname -a)"
          echo "Event:  ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Python: $(python3 --version)"
          echo "Docker: $(docker --version 2>/dev/null || echo 'not available')"

      - name: Confirm repo structure
        run: |
          echo "=== Backend ==="
          ls backend/
          echo "=== Tests ==="
          ls backend/tests/services/

  # ============================================================
  # BACKEND LANE
  # ============================================================

  # ------------------------------------------------------------
  # Stage 2 — Backend lint (every push + PR)
  # ------------------------------------------------------------
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.15.11

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

  # ------------------------------------------------------------
  # Stage 3 — Backend tests + migration smoke (PR or dev/main)
  # ------------------------------------------------------------
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install fonts (required by PyWeaving renderer)
        run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Wait for Postgres to accept connections
        run: |
          python3 - << 'EOF'
          import socket, time, sys
          for i in range(30):
              try:
                  socket.create_connection(("postgres", 5432), timeout=2).close()
                  print("postgres ready")
                  sys.exit(0)
              except OSError:
                  print(f"waiting for postgres... ({i+1}/30)")
                  time.sleep(2)
          print("postgres not ready after 60s")
          sys.exit(1)
          EOF

      - name: Run pytest
        run: cd backend && python -m pytest tests/ -v
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

  migration-smoke-test:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Wait for Postgres to accept connections
        run: |
          python3 - << 'EOF'
          import socket, time, sys
          for i in range(30):
              try:
                  socket.create_connection(("postgres", 5432), timeout=2).close()
                  print("postgres ready")
                  sys.exit(0)
              except OSError:
                  print(f"waiting for postgres... ({i+1}/30)")
                  time.sleep(2)
          print("postgres not ready after 60s")
          sys.exit(1)
          EOF

      - name: Run migrations (upgrade head)
        run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production

      - name: Verify no pending migrations (alembic check)
        run: cd backend && alembic check
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
          APP_SECRET_KEY: ci-alembic-key-not-for-production

  # ------------------------------------------------------------
  # Stage 4 — Backend dependency audit (PR or dev/main)
  # ------------------------------------------------------------
  dependency-audit-backend:
    name: Dependency audit — backend (pip-audit)
    runs-on: ubuntu-latest
    needs: [backend-tests, migration-smoke-test]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip-audit (production deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

  # ------------------------------------------------------------
  # Stage 5 — Backend SBOM + Docker build (parallel, PR or dev/main)
  # ------------------------------------------------------------
  sbom-backend:
    name: SBOM backend (CycloneDX + pip-licenses)
    runs-on: ubuntu-latest
    needs: [dependency-audit-backend]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_TOKEN }}
          fetch-depth: 0

      - name: Detect backend package changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE=""
          fi
          if [ -z "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only "$BASE" HEAD | grep -q "^backend/requirements" \
              && echo "changed=true"  >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate backend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          pip install cyclonedx-bom pip-licenses
          pip install -r backend/requirements.txt
          mkdir -p sbom
          cyclonedx-py requirements backend/requirements.txt \
            --output-format JSON \
            --output-file sbom/sbom-backend.json
          pip-licenses --format=json --output-file sbom/licenses-backend.json

      - name: Commit backend manifests if changed
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@weaving-site"
          git add sbom/sbom-backend.json sbom/licenses-backend.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update backend SBOM and license manifest [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi

      - name: Upload backend manifests
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: sbom-backend-${{ github.sha }}
          path: |
            sbom/sbom-backend.json
            sbom/licenses-backend.json
          retention-days: 90

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [dependency-audit-backend]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t weaving-backend-check .

  # ============================================================
  # FRONTEND LANE
  # ============================================================

  # ------------------------------------------------------------
  # Stage 2 — Frontend lint (every push + PR)
  # ------------------------------------------------------------
  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  # ------------------------------------------------------------
  # Stage 3 — Frontend typecheck (every push + PR)
  # ------------------------------------------------------------
  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc -b --noEmit

  # ------------------------------------------------------------
  # Stage 4 — Frontend dependency audit (PR or dev/main)
  # ------------------------------------------------------------
  dependency-audit-frontend:
    name: Dependency audit — frontend (npm audit)
    runs-on: ubuntu-latest
    needs: [frontend-typecheck]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: npm audit (high+ only)
        run: cd frontend && npm ci && npm audit --audit-level=high

  # ------------------------------------------------------------
  # Stage 5 — Frontend SBOM + Docker build (parallel, PR or dev/main)
  # ------------------------------------------------------------
  sbom-frontend:
    name: SBOM frontend (CycloneDX + license-checker)
    runs-on: ubuntu-latest
    needs: [dependency-audit-frontend]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_TOKEN }}
          fetch-depth: 0

      - name: Detect frontend package changes
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            BASE="HEAD~1"
          else
            BASE=""
          fi
          if [ -z "$BASE" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git diff --name-only "$BASE" HEAD | grep -qE "^frontend/package(-lock)?\.json" \
              && echo "changed=true"  >> $GITHUB_OUTPUT \
              || echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        if: steps.detect.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Generate frontend SBOM and license manifest
        if: steps.detect.outputs.changed == 'true'
        run: |
          cd frontend && npm ci
          mkdir -p ../sbom
          npx @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-frontend.json
          npx license-checker --json --out ../sbom/licenses-frontend.json

      - name: Commit frontend manifests if changed
        if: steps.detect.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@weaving-site"
          git add sbom/sbom-frontend.json sbom/licenses-frontend.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update frontend SBOM and license manifest [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi

      - name: Upload frontend manifests
        if: steps.detect.outputs.changed == 'true'
        uses: actions/upload-artifact@v3
        with:
          name: sbom-frontend-${{ github.sha }}
          path: |
            sbom/sbom-frontend.json
            sbom/licenses-frontend.json
          retention-days: 90

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [dependency-audit-frontend]
    if: >-
      (github.event_name == 'pull_request' ||
       github.ref_name == 'dev' ||
       github.ref_name == 'main') &&
      !contains(github.event.head_commit.message || '', '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend

  # ============================================================
  # CONVERGENCE
  # ============================================================

  # ------------------------------------------------------------
  # Stage 6 — Version bump (dev/main push only)
  # ------------------------------------------------------------
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend]
    if: >-
      github.event_name == 'push' &&
      (github.ref_name == 'dev' || github.ref_name == 'main')
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci@weaving-site"

      - name: Determine and apply version bump
        id: version
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          branch = os.environ.get("GITHUB_REF_NAME", "dev")

          # ── Read current version ──────────────────────────────────────────
          with open("VERSION") as f:
              current = f.read().strip()
          major, minor, patch = map(int, current.split("."))

          # ── Collect commits since last tag ────────────────────────────────
          result = subprocess.run(
              ["git", "describe", "--tags", "--abbrev=0"],
              capture_output=True, text=True
          )
          last_tag = result.stdout.strip() if result.returncode == 0 else None

          if last_tag:
              log = subprocess.run(
                  ["git", "log", f"{last_tag}..HEAD", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout
          else:
              log = subprocess.run(
                  ["git", "log", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout

          # ── Determine bump level ──────────────────────────────────────────
          breaking = bool(
              re.search(r"BREAKING CHANGE:", log) or
              re.search(r"^[a-z]+!:", log, re.MULTILINE)
          )
          has_feat = bool(re.search(r"^feat(\(.*?\))?:", log, re.MULTILINE))

          if breaking:
              bump = "major"
          elif branch == "main":
              bump = "minor"
          elif has_feat:
              bump = "minor"
          else:
              bump = "patch"

          # ── Compute new version ───────────────────────────────────────────
          if bump == "major":
              new_ver = f"{major + 1}.0.0"
          elif bump == "minor":
              new_ver = f"{major}.{minor + 1}.0"
          else:
              new_ver = f"{major}.{minor}.{patch + 1}"

          tag = f"v{new_ver}-dev" if branch == "dev" else f"v{new_ver}"

          print(f"Branch:  {branch}")
          print(f"Bump:    {bump}  ({current} → {new_ver})")
          print(f"Tag:     {tag}")

          # ── Update VERSION ────────────────────────────────────────────────
          with open("VERSION", "w") as f:
              f.write(new_ver + "\n")

          # ── Update frontend/package.json ──────────────────────────────────
          pkg = open("frontend/package.json").read()
          pkg = re.sub(
              r'("version"\s*:\s*")[^"]+(")',
              rf'\g<1>{new_ver}\2',
              pkg
          )
          open("frontend/package.json", "w").write(pkg)

          # ── Write outputs for subsequent steps ────────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh_out:
              gh_out.write(f"new_version={new_ver}\n")
              gh_out.write(f"tag={tag}\n")

          PYEOF

      - name: Commit version files
        run: |
          git add VERSION frontend/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"

      - name: Push version commit
        run: |
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
