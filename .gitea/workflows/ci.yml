name: CI

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:

  # ------------------------------------------------------------
  # Disabled — kept for reference to verify runner connectivity.
  # Re-enable by removing the `if: false` line.
  # ------------------------------------------------------------
  smoke-test:
    name: Runner smoke test
    runs-on: ubuntu-latest
    if: false
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Print environment info
        run: |
          echo "Runner: $(uname -a)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Python: $(python3 --version)"
          echo "Docker: $(docker --version 2>/dev/null || echo 'not available')"

      - name: Confirm repo structure
        run: |
          echo "=== Backend ==="
          ls backend/
          echo "=== Tests ==="
          ls backend/tests/services/

  # ------------------------------------------------------------
  # Backend — unit tests
  # ------------------------------------------------------------
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install fonts (required by PyWeaving renderer)
        run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Patch PyWeaving font path
        run: |
          PYWEAVING_DATA=$(python -c "import pyweaving.render as r, os; print(os.path.join(os.path.dirname(r.__file__), 'data'))")
          mkdir -p "$PYWEAVING_DATA"
          cp /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf "$PYWEAVING_DATA/Arial.ttf"

      - name: Run pytest
        run: cd backend && python -m pytest tests/ -v

  # ------------------------------------------------------------
  # Frontend — TypeScript type check
  # ------------------------------------------------------------
  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc -b --noEmit
