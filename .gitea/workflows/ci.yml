name: CI

# Pipeline stages (each stage gates the next):
#
#   1. runner-check                        — smoke test, verifies runner environment
#   2. backend-lint + frontend-lint        — parallel, both must pass before tests run
#   3. backend-tests + frontend-typecheck + migration-smoke-test  — parallel, all must pass before audit
#   4. dependency-audit                    — pip-audit (any CVE) + npm audit (high+)
#   5. docker-build                        — verifies both Dockerfiles build cleanly
#   6. bump-version                        — PATCH/MINOR/MAJOR bump on dev/main only
#
# Add [skip ci] to any commit message to skip CI entirely (e.g. docs-only changes).
#
# Required secret: CI_TOKEN
#   A Gitea personal access token with repository: Read & Write permission.
#   Set it at: Repository → Settings → Secrets → Actions.
#
# Version strategy:
#   push to dev  → PATCH bump  (0.1.0 → 0.1.1), tag v0.1.1-dev
#   push to main → MINOR bump  (0.1.1 → 0.2.0), tag v0.2.0
#   feat: anywhere on dev      → MINOR bump instead of PATCH
#   BREAKING CHANGE: or feat!: → MAJOR bump regardless of branch

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:

  # ------------------------------------------------------------
  # Stage 1 — Runner sanity check
  # ------------------------------------------------------------
  runner-check:
    name: Runner smoke test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Print environment info
        run: |
          echo "Runner: $(uname -a)"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Python: $(python3 --version)"
          echo "Docker: $(docker --version 2>/dev/null || echo 'not available')"

      - name: Confirm repo structure
        run: |
          echo "=== Backend ==="
          ls backend/
          echo "=== Tests ==="
          ls backend/tests/services/

  # ------------------------------------------------------------
  # Stage 2 — Linting (parallel)
  # ------------------------------------------------------------
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.15.11

      - name: Ruff lint
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format --check backend/

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    needs: [runner-check]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: ESLint
        run: cd frontend && npm run lint

  # ------------------------------------------------------------
  # Stage 3 — Tests (parallel, requires full lint stage)
  # ------------------------------------------------------------
  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Install fonts (required by PyWeaving renderer)
        run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Run pytest
        run: cd backend && python -m pytest tests/ -v

  frontend-typecheck:
    name: Frontend type check (tsc)
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Type check
        run: cd frontend && npx tsc -b --noEmit

  migration-smoke-test:
    name: Alembic migration smoke test
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Wait for Postgres to accept connections
        run: |
          python3 - << 'EOF'
          import socket, time, sys
          for i in range(30):
              try:
                  socket.create_connection(("postgres", 5432), timeout=2).close()
                  print("postgres ready")
                  sys.exit(0)
              except OSError:
                  print(f"waiting for postgres... ({i+1}/30)")
                  time.sleep(2)
          print("postgres not ready after 60s")
          sys.exit(1)
          EOF

      - name: Run migrations (upgrade head)
        run: cd backend && alembic upgrade head
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

      - name: Verify no pending migrations (alembic check)
        run: cd backend && alembic check
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          POSTGRES_DB: weaving_site
          POSTGRES_USER: weaving_user
          POSTGRES_PASSWORD: ci_test_password

  # ------------------------------------------------------------
  # Stage 4 — Dependency vulnerability audit
  # ------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (pip-audit + npm audit)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-typecheck, migration-smoke-test]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: pip-audit (production deps)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: npm audit (high+ only)
        run: cd frontend && npm install && npm audit --audit-level=high

  # ------------------------------------------------------------
  # Stage 5 — Docker build check
  # ------------------------------------------------------------
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [dependency-audit]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t weaving-backend-check .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t weaving-frontend-check ./frontend

  # ------------------------------------------------------------
  # Stage 6 — Version bump (dev/main only)
  # ------------------------------------------------------------
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: >-
      github.event_name == 'push' &&
      (github.ref_name == 'dev' || github.ref_name == 'main')
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.CI_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name  "ci-bot"
          git config user.email "ci@weaving-site"

      - name: Determine and apply version bump
        id: version
        run: |
          python3 - << 'PYEOF'
          import subprocess, re, os

          branch = os.environ.get("GITHUB_REF_NAME", "dev")

          # ── Read current version ──────────────────────────────────────────
          with open("VERSION") as f:
              current = f.read().strip()
          major, minor, patch = map(int, current.split("."))

          # ── Collect commits since last tag ────────────────────────────────
          result = subprocess.run(
              ["git", "describe", "--tags", "--abbrev=0"],
              capture_output=True, text=True
          )
          last_tag = result.stdout.strip() if result.returncode == 0 else None

          if last_tag:
              log = subprocess.run(
                  ["git", "log", f"{last_tag}..HEAD", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout
          else:
              log = subprocess.run(
                  ["git", "log", "--pretty=format:%s%n%b"],
                  capture_output=True, text=True
              ).stdout

          # ── Determine bump level ──────────────────────────────────────────
          breaking = bool(
              re.search(r"BREAKING CHANGE:", log) or
              re.search(r"^[a-z]+!:", log, re.MULTILINE)
          )
          has_feat = bool(re.search(r"^feat(\(.*?\))?:", log, re.MULTILINE))

          if breaking:
              bump = "major"
          elif branch == "main":
              bump = "minor"
          elif has_feat:
              bump = "minor"
          else:
              bump = "patch"

          # ── Compute new version ───────────────────────────────────────────
          if bump == "major":
              new_ver = f"{major + 1}.0.0"
          elif bump == "minor":
              new_ver = f"{major}.{minor + 1}.0"
          else:
              new_ver = f"{major}.{minor}.{patch + 1}"

          tag = f"v{new_ver}-dev" if branch == "dev" else f"v{new_ver}"

          print(f"Branch:  {branch}")
          print(f"Bump:    {bump}  ({current} → {new_ver})")
          print(f"Tag:     {tag}")

          # ── Update VERSION ────────────────────────────────────────────────
          with open("VERSION", "w") as f:
              f.write(new_ver + "\n")

          # ── Update frontend/package.json ──────────────────────────────────
          pkg = open("frontend/package.json").read()
          pkg = re.sub(
              r'("version"\s*:\s*")[^"]+(")',
              rf'\g<1>{new_ver}\2',
              pkg
          )
          open("frontend/package.json", "w").write(pkg)

          # ── Write outputs for subsequent steps ────────────────────────────
          with open(os.environ["GITHUB_OUTPUT"], "a") as gh_out:
              gh_out.write(f"new_version={new_ver}\n")
              gh_out.write(f"tag={tag}\n")

          PYEOF

      - name: Commit version files
        run: |
          git add VERSION frontend/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"

      - name: Push version commit
        run: |
          git pull --rebase origin ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}
