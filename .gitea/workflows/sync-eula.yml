name: Sync EULA to migration

on:
  workflow_dispatch:

jobs:
  sync-eula:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v6
        with:
          ref: dev
          token: ${{ secrets.CI_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run export script
        id: export
        run: |
          output=$(python tools/export_eula_migration.py --api-url "${{ secrets.EULA_API_URL }}" 2>&1)
          echo "$output"
          written=$(echo "$output" | grep '^Written:' | awk '{print $2}')
          if [ -z "$written" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            first_file=$(echo "$written" | head -1)
            version=$(grep -oP "version='\K[^']+" "$first_file" | head -1)
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push branch
        if: steps.export.outputs.has_changes == 'true'
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@weaving-site"
          branch="chore/sync-eula-${{ steps.export.outputs.version }}"
          git checkout -b "$branch"
          git add backend/alembic/versions/
          git commit -m "chore: persist EULA version ${{ steps.export.outputs.version }} to migrations [skip ci]"
          git push origin "$branch"

      - name: Open pull request
        if: steps.export.outputs.has_changes == 'true'
        run: |
          python - <<'EOF'
          import json, os, urllib.request

          server = os.environ["GITHUB_SERVER_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["CI_TOKEN"]
          version = os.environ["EULA_VERSION"]
          branch = f"chore/sync-eula-{version}"

          url = f"{server}/api/v1/repos/{repo}/pulls"
          body = json.dumps({
              "title": f"chore: sync EULA version {version} to migrations",
              "body": (
                  f"Auto-generated by the **sync-eula** workflow.\n\n"
                  f"Adds the Alembic migration for EULA version `{version}` "
                  f"fetched from the live API endpoint."
              ),
              "head": branch,
              "base": "dev",
          }).encode()

          req = urllib.request.Request(
              url,
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": f"token {token}",
              },
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              pr = json.loads(resp.read())
          print(f"PR opened: {pr['html_url']}")
          EOF
        env:
          CI_TOKEN: ${{ secrets.CI_TOKEN }}
          EULA_VERSION: ${{ steps.export.outputs.version }}

      - name: Nothing to do
        if: steps.export.outputs.has_changes == 'false'
        run: echo "No new EULA versions found — all migrations are up to date."
