log_format json_combined escape=json
  '{"timestamp": "$time_iso8601", '
   '"level": "INFO", '
   '"source": "nginx", '
   '"remote_addr": "$remote_addr", '
   '"method": "$request_method", '
   '"uri": "$request_uri", '
   '"status": $status, '
   '"bytes_sent": $body_bytes_sent, '
   '"request_time": $request_time, '
   '"referrer": "$http_referer", '
   '"user_agent": "$http_user_agent"}';

# Rate-limit zones (http context — this file is included inside http {} by nginx.conf)
# General API: 30 req/s per IP, burst 60 (handles normal SPA usage comfortably)
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
# Upload endpoints: 5 req/s per IP, burst 10 (WIF uploads and photo uploads)
limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log json_combined;

    client_max_body_size 25M;

    # Upload endpoints — stricter rate limit
    location ~ ^/(api/projects$|api/projects/[^/]+/photos$) {
        limit_req zone=uploads burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /webhooks/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # env-config.js is rewritten at every container start — never cache it
    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
